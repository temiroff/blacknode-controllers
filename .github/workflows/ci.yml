name: Package CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out package
        uses: actions/checkout@v6
        with:
          path: package
      - name: Check out Blacknode
        uses: actions/checkout@v6
        with:
          repository: temiroff/Blacknode
          path: core
      - name: Check out ROS 2 dependency
        uses: actions/checkout@v6
        with:
          repository: temiroff/blacknode-ros2
          path: core/packages/blacknode-ros2
      - name: Check out template dependencies
        shell: bash
        run: |
          git clone --depth 1 https://github.com/temiroff/blacknode-robot.git core/packages/blacknode-robot
          git clone --depth 1 https://github.com/temiroff/blacknode-perception.git core/packages/blacknode-vision
          git clone --depth 1 https://github.com/temiroff/blacknode-dataset.git core/packages/blacknode-dataset
          git clone --depth 1 https://github.com/temiroff/blacknode-training.git core/packages/blacknode-training
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./core pytest
          python -m pip install "numpy>=1.24" "pillow>=10"
          if [ -f package/requirements.txt ]; then
            python -m pip install -r package/requirements.txt
          fi
      - name: Link package into Blacknode
        shell: bash
        run: |
          mkdir -p core/packages
          ln -s "$GITHUB_WORKSPACE/package" "core/packages/${GITHUB_REPOSITORY#*/}"
      - name: Run package tests
        working-directory: package
        env:
          PYTHONPATH: ../core/python
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest tests
      - name: Validate official package catalog
        working-directory: core
        env:
          PYTHONPATH: python
        run: python -m blacknode.cli packages validate-catalog ../package
      - name: Validate package templates
        if: ${{ hashFiles('package/**/templates/*.json') != '' }}
        working-directory: core
        env:
          PYTHONPATH: python
        shell: bash
        run: |
          python -m blacknode.cli packages enable blacknode-controllers mobile-base --adapter ros2
          python -m blacknode.cli packages enable blacknode-controllers policy --adapter ros2
          find ../package -path '*/templates/*.json' -print0 | while IFS= read -r -d '' template; do
            python -m blacknode.cli validate "$template"
          done
